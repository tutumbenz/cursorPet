<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor cube</title>
</head>

<body>
    <div id="cube"></div>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
        }

        #cube {
            width: 50px;
            height: 50px;
            background-color: cyan;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
    <script src="Blob.js"></script>
</body>

</html>
